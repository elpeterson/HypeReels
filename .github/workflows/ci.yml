name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "chore/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/hypereels-api
  IMAGE_WORKER: ghcr.io/${{ github.repository_owner }}/hypereels-worker

jobs:
  # ─── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript type-check
        working-directory: server
        run: npm run typecheck

      - name: ESLint
        working-directory: server
        run: npm run lint
        # Treat as warning for now — fail only on errors
        continue-on-error: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: workers/requirements.txt

      - name: Install Python linting tools
        run: pip install ruff

      - name: Ruff lint (Python workers)
        run: ruff check workers/ --select E,F,W --ignore E501

  # ─── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    # Real service containers — NOT mocked
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hypereels
          POSTGRES_PASSWORD: hypereels
          POSTGRES_DB: hypereels
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hypereels -d hypereels"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # MinIO needs the server command; use env var trick supported by GitHub
        # Actions' Docker service syntax — starts with default entrypoint
        # NOTE: service containers can't override CMD, so MinIO will use its
        # default standalone mode which starts on :9000 automatically.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Create MinIO test bucket
        run: |
          # Install mc
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/hypereels

      - name: Apply database schema
        env:
          PGPASSWORD: hypereels
        run: |
          for f in server/src/db/migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U hypereels -d hypereels -f "$f"
          done

      - name: Run server tests
        working-directory: server
        env:
          DATABASE_URL: "postgresql://hypereels:hypereels@localhost:5432/hypereels?sslmode=disable"
          DATABASE_SSL: "false"
          REDIS_URL: "redis://localhost:6379"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY_ID: "minioadmin"
          MINIO_SECRET_ACCESS_KEY: "minioadmin"
          MINIO_BUCKET: "hypereels"
          MINIO_PUBLIC_URL: "http://localhost:9000/hypereels"
          R2_ENDPOINT_URL: "http://localhost:9000"
          R2_ACCESS_KEY_ID: "minioadmin"
          R2_SECRET_ACCESS_KEY: "minioadmin"
          R2_BUCKET_NAME: "hypereels"
          PYTHON_WORKER_URL: "http://localhost:8000"
          NODE_ENV: "test"
          PORT: "3001"
          SESSION_TTL_HOURS: "24"
          SESSION_TTL_SECONDS: "86400"
          MAX_CLIP_SIZE_BYTES: "500000000"
          INSIGHTFACE_PROVIDERS: "CPUExecutionProvider"
        run: npm test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: workers/requirements.txt

      - name: Install Python worker dependencies
        working-directory: workers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Python worker tests
        working-directory: workers
        env:
          DATABASE_URL: "postgresql://hypereels:hypereels@localhost:5432/hypereels?sslmode=disable"
          REDIS_URL: "redis://localhost:6379"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY_ID: "minioadmin"
          MINIO_SECRET_ACCESS_KEY: "minioadmin"
          MINIO_BUCKET: "hypereels"
          INSIGHTFACE_PROVIDERS: "CPUExecutionProvider"
        run: pytest tests/ -v --tb=short

  # ─── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (git SHA)
        id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build API image (no push yet — just verify it builds)
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          target: prod
          push: false
          tags: ${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Worker image (no push yet)
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.workers
          push: false
          tags: ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 4. Push ────────────────────────────────────────────────────────────────
  # Only runs on pushes to main (not on PRs).
  # Tags images with git SHA — NEVER with 'latest'.
  push:
    name: Push Images to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (git SHA)
        id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push API image (git SHA tag only — no 'latest')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          target: prod
          push: true
          # Deliberately only one tag: the git SHA. No 'latest' tag.
          tags: ${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Worker image (git SHA tag only — no 'latest')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.workers
          push: true
          tags: ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output pushed image references
        run: |
          echo "API image:    ${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha }}"
          echo "Worker image: ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.sha }}"
