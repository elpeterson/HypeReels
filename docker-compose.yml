version: "3.9"

# ─── Shared defaults ──────────────────────────────────────────────────────────
x-env-common: &env-common
  # PostgreSQL — self-hosted (Quorra Docker hypereels-postgres, 192.168.1.100:7432 in production)
  DATABASE_URL: "postgresql://hypereels:hypereels@postgres:5432/hypereels?sslmode=disable"
  DATABASE_SSL: "false"
  # Redis — self-hosted (Proxmox CT 114, 192.168.1.137:6379 in production)
  REDIS_URL: "redis://redis:6379"
  # MinIO (self-hosted object storage — Proxmox CT 115, storage_1tb ZFS pool, 192.168.1.138:9000 in production)
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_ACCESS_KEY_ID: "minioadmin"
  MINIO_SECRET_ACCESS_KEY: "minioadmin"
  MINIO_BUCKET: "hypereels"
  MINIO_PUBLIC_URL: "http://localhost:9000/hypereels"
  # Legacy R2_* aliases kept for compatibility during migration
  R2_ENDPOINT: "http://minio:9000"
  R2_ACCESS_KEY_ID: "minioadmin"
  R2_SECRET_ACCESS_KEY: "minioadmin"
  R2_BUCKET: "hypereels"
  R2_PUBLIC_URL: "http://localhost:9000/hypereels"
  # Prometheus metrics — scraped by existing Prometheus on Quorra (192.168.1.100)
  METRICS_PATH: "/metrics"
  # App config
  PYTHON_WORKER_URL: "http://python-workers:8000"
  SESSION_TTL_HOURS: "24"
  CLEANUP_GRACE_PERIOD_MINUTES: "5"
  NODE_ENV: "development"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "http://localhost:5173"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hypereels
      POSTGRES_PASSWORD: hypereels
      POSTGRES_DB: hypereels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-apply schema on first boot
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypereels -d hypereels"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── MinIO (local dev — mirrors CT 115 storage_1tb ZFS pool in production) ───
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # MinIO bucket initialiser — runs once and exits
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/hypereels &&
        mc anonymous set download local/hypereels &&
        echo 'MinIO bucket hypereels ready.'
      "
    restart: "no"

  # ─── Node.js API + workers ──────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *env-common
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    volumes:
      # Mount source for hot reload (tsx watch)
      - ./server/src:/app/src:ro
      - ./server/package.json:/app/package.json:ro
      - ./server/tsconfig.json:/app/tsconfig.json:ro
      # Exclude node_modules from host
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Python workers (audio analysis + assembly + person detection frames) ───
  python-workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *env-common
      # Python-side HTTP server port
      PORT: "8000"
      # FFmpeg path (installed in Dockerfile)
      FFMPEG_PATH: "/usr/bin/ffmpeg"
    ports:
      - "8000:8000"
    volumes:
      # Mount worker source for hot reload during development
      - ./workers:/app:ro
      # Scratch space for temporary render files
      - worker_tmp:/tmp/hypereels
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_node_modules:
  worker_tmp:
