# HypeReels — Profile 2: GPU-Enabled (Single Machine)
#
# All services on one machine. NVIDIA GPU is optional — CPU fallback is automatic.
# InsightFace: CUDAExecutionProvider → CPUExecutionProvider (auto-fallback).
# FFmpeg: set FFMPEG_HWACCEL=nvenc in .env to enable NVENC; defaults to x264.
#
# Reference implementation: Quorra (Unraid, NVIDIA GTX 1080 Ti)
# See: docs/deployment/profile-2-gpu.md
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose -f docker/docker-compose.gpu.yml build
#   docker compose -f docker/docker-compose.gpu.yml up -d
#
# To run CPU-only (no GPU / no nvidia-container-toolkit):
#   Remove the 'deploy' block from the 'worker' service below, then:
#   docker compose -f docker/docker-compose.gpu.yml up -d
#
# Prerequisites for GPU mode:
#   nvidia-container-toolkit installed, Docker configured with NVIDIA runtime:
#     nvidia-ctk runtime configure --runtime=docker && systemctl restart docker

services:

  # ── API + SPA ────────────────────────────────────────────────────────────────
  api:
    image: hypereels-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: prod
    container_name: hypereels-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    volumes:
      - ../server/client-dist:/app/client-dist:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hypereels

  # ── Python workers (GPU-enabled with CPU fallback) ────────────────────────────
  worker:
    image: hypereels-worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.workers
    container_name: hypereels-worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - FFMPEG_PATH=/usr/bin/ffmpeg
      # GPU with automatic CPU fallback. Set FFMPEG_HWACCEL=nvenc in .env
      # to enable NVIDIA hardware video encoding (GTX 1060+ required).
    volumes:
      - /tmp/hypereels:/tmp/hypereels
    # GPU passthrough via NVIDIA Container Runtime.
    # Remove this 'deploy' block entirely to force CPU-only mode.
    # InsightFace will detect no GPU and fall back to CPUExecutionProvider automatically.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hypereels

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hypereels-postgres
    restart: unless-stopped
    env_file:
      - ../.env.postgres
    volumes:
      - hypereels-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypereels -d hypereels"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hypereels

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hypereels-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --requirepass $${REDIS_PASSWORD:-}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru"
    env_file:
      - ../.env.redis
    volumes:
      - hypereels-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hypereels

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hypereels-minio
    restart: unless-stopped
    command: server /data --console-address :9001
    env_file:
      - ../.env.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hypereels-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hypereels

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hypereels-prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - hypereels

networks:
  hypereels:
    driver: bridge

volumes:
  hypereels-postgres-data:
  hypereels-redis-data:
  hypereels-minio-data:
  prometheus-data:
