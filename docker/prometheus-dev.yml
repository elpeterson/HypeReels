# Prometheus configuration — local dev
# Scrapes the HypeReels API /metrics endpoint.
# Used by docker/docker-compose.dev.yml only.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "hypereels-api"
    static_configs:
      - targets: ["api:3001"]
    metrics_path: "/metrics"
